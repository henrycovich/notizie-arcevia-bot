name: Notizie Arcevia Bot

on:
  schedule:
    - cron: '0 * * * *'   # ogni ora — fetch notizie
    - cron: '0 19 * * *'  # 19:00 UTC = 20:00 ora solare / 21:00 ora legale
  workflow_dispatch:        # avvio manuale
    inputs:
      mode:
        description: 'Modalità di esecuzione'
        required: true
        default: 'once'
        type: choice
        options:
          - once
          - digest

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Ripristina database notizie (cache)
        uses: actions/cache@v4
        with:
          path: news.db
          key: news-db-cache
          restore-keys: news-db-

      - name: Fetch notizie (ogni ora)
        if: github.event.schedule == '0 * * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'once')
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --once

      - name: Digest serale (19:00 UTC)
        if: github.event.schedule == '0 19 * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'digest')
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --digest
